name: IAESTE Job Monitor


on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Run monitor
        env:
          IAESTE_EMAIL: ${{ secrets.IAESTE_EMAIL }}
          IAESTE_PASSWORD: ${{ secrets.IAESTE_PASSWORD }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python iaeste_job_monitor.py

      - name: Save seen jobs file
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add seen_jobs.json
          git commit -m "Update seen IAESTE jobs" || echo "No changes to commit"
          git push